tickers:
  # Major ETFs
  - SPY
  - QQQ
  - IWM
  # Mega-cap Tech
  - AAPL
  - MSFT
  - NVDA
  - GOOGL
  - AMZN
  # High Beta
  - TSLA
  - AMD
  - NFLX
  # Others (existing)
  - META
  - INTC
  - TQQQ
  - VIX
log_dir: "./logs"
data_dir: "./data"
enable_gemini: true
gemini:
  model_name: "gemini-2.5-flash"
market_context:
  # VIX thresholds
  vix_low_threshold: 15.0
  vix_high_threshold: 25.0
  vix_extreme_threshold: 35.0
  # Earnings penalty
  earnings_penalty_days: 5
  earnings_penalty: 0.2
  # Economic event penalty
  economic_blackout_days: 2
  economic_penalty: 0.15
# FMP API key for earnings data (required for earnings monitoring)
fmp_api_key: "${FMP_API_KEY}"
reddit:
  enabled: false
  subreddits:
    - wallstreetbets
    - options
    - stocks
  lookback_posts: 100
  min_confidence: 0.5
  # Note: RSS feeds don't provide upvote/comment counts reliably
  # min_upvotes is now used as a secondary filter when data is available
  check_interval_minutes: 30
stock_data:
  enabled: true
  client_id_offset: 25
  history_dir: "./historydata/stock_prices"
  extra_ma_periods:
    - 50
    - 200
  history_request:
    duration: "180 D"
    bar_size: "1 day"
    what_to_show: "ADJUSTED_LAST"
    use_rth: true
strategies:
  PutCreditSpreadStrategy:
    params:
      min_days_to_expiry: 18
      max_days_to_expiry: 38
      spread_width: 5.0
      min_credit: 0.55
      short_target_delta: 0.25
      short_otm_pct: 0.035
    published_win_rate: 0.70
  VerticalSpreadStrategy:
    params:
      spread_width: 5.0
      min_days_to_expiry: 14
      max_days_to_expiry: 45
      target_days_to_expiry: 35
      max_iv_rank: 0.3
      min_risk_reward_ratio: 1.1
      bearish_iv_rank_trigger: 0.5
    published_win_rate: 0.60
  CoveredCallStrategy:
    params:
      min_days_to_expiry: 21
      min_annualized_yield: 0.12
      enabled: false
    published_win_rate: 0.75
  IronCondorStrategy:
    params:
      target_delta: 0.18
      premium_threshold: 0.5
      min_credit_pct: 0.0025
      max_expiries_per_symbol: 4
      delta_tolerance: 0.1
      spread_width: 5.0
      allowed_symbols:
        - SPY
        - QQQ
        - IWM
    published_win_rate: 0.65
  PoorMansCoveredCallStrategy:
    params:
      leaps_min_days: 180
      leaps_delta_threshold: 0.6
      leaps_max_strike_pct: 0.95
      max_leaps_extrinsic_pct: 0.45
      leaps_max_theta_abs: 0.06
      short_min_days: 18
      short_max_days: 65
      short_otm_pct: 0.03
      short_delta_range:
        - 0.15
        - 0.5
      short_min_theta_abs: 0.02
      min_return_on_capital: 0.05
      max_trade_ideas: 5
    published_win_rate: 0.65
  VixFearFadeStrategy:
    params:
      vix_symbol: "VIX"
      target_symbol: "QQQ"
      vix_threshold: 35.0
      confirmation_sessions: 5
      enabled: false
    published_win_rate: 0.55
  TqqqQqqRotationStrategy:
    params:
      enabled: true
    published_win_rate: 0.60
  WhaleFollowingStrategy:
    params:
      enabled: false
      min_confidence: 0.5
      min_upvotes: 50
      max_positions: 3
    published_win_rate: 0.50
  EarningsGambalStrategy:
    params:
      # Only generate signals 1-5 days before earnings
      min_days_to_earnings: 1
      max_days_to_earnings: 5
      # Smaller position size due to higher risk
      max_position_size: 0.5
      # High delta for directional plays
      target_delta: 0.40
      # Minimum expected move to justify volatility play
      min_expected_move: 0.05
      # Equal weight to straddle and directional analysis
      straddle_weight: 0.5
      directional_weight: 0.5
    published_win_rate: 0.45
schedule:
  times:
    - "06:30"
    - "10:00"
    - "12:15"
    - "12:50"
  timezone: "America/Los_Angeles"
slack:
  enabled: true
  webhook_url: "https://hooks.slack.com/services/XXX/YY/ZZ"
  username: "Option Scanner"
  channel: "#option-scanner-test"
  icon_emoji: ":chart_with_upwards_trend:"
  title: "Daily Option Scanner Signals"
  max_rows: 30
logging:
  # Grafana Loki configuration for centralized logging
  loki:
    enabled: true  # Set to false to disable Loki logging
    batch_size: 100  # Number of logs to batch before sending
    flush_interval: 5  # Seconds between flushes
  console:
    level: "INFO"  # Log level for console output
  file:
    level: "DEBUG"  # Log level for file output
    rotation: "1 week"
    retention: "90 days"
automation:
  enabled: false
  trade_execution:
    enabled: true
    default_quantity: 1
    limit_padding_pct: 0.05
    max_spread_pct: 0.6
    max_orders: 5
    allow_market_fallback: true
  portfolio_execution:
    enabled: false
    max_positions: 5
    use_market_orders: false
    limit_padding_pct: 0.03
