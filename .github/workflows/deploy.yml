name: Deploy to Raspberry Pi

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-raspi
  cancel-in-progress: true

env:
  TS_SSH_USER: ${{ secrets.TAILSCALE_SSH_USER }}
  TS_HOST: ${{ secrets.TAILSCALE_IP }}
  TS_SSH_KEY: ${{ secrets.TAILSCALE_SSH_KEY }}

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run tests
        run: |
          pytest -v --tb=short

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTH_KEY }}
          tags: tag:ci

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "$TS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$TS_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Transfer code via scp
        run: |
          set -euo pipefail
          # Create temp directory with files to transfer (excluding unnecessary files)
          rsync -avz --exclude='.git' --exclude='.github' --exclude='__pycache__' \
            --exclude='*.pyc' --exclude='.venv' --exclude='results/' --exclude='logs/' \
            ./ $TS_SSH_USER@$TS_HOST:/tmp/optionscanner-deploy/

      - name: Deploy with docker compose
        run: |
          ssh -o StrictHostKeyChecking=no $TS_SSH_USER@$TS_HOST << 'ENDSSH'
          set -euo pipefail
          cd ~/optionscanner

          # Backup current config.yaml if it exists
          if [ -f config.yaml ]; then
            cp config.yaml config.yaml.backup
          fi

          # Move deployed files from temp
          cp -r /tmp/optionscanner-deploy/* .
          rm -rf /tmp/optionscanner-deploy

          # Restore config.yaml if it was backed up
          if [ -f config.yaml.backup ]; then
            mv config.yaml.backup config.yaml
          fi

          # Write .env from secrets
          cat > .env << ENVEOF
          TWS_USERID=${{ secrets.TWS_USERID }}
          TWS_PASSWORD=${{ secrets.TWS_PASSWORD }}
          IAPI_CLIENT_ID=${{ secrets.IAPI_CLIENT_ID }}
          TRADING_MODE=${{ secrets.TRADING_MODE }}
          VNC_SERVER_PASSWORD=${{ secrets.VNC_SERVER_PASSWORD }}
          READ_ONLY_API=${{ secrets.READ_ONLY_API }}
          IBKR_HOST=127.0.0.1
          IBKR_PORT=4002
          IBKR_CLIENT_ID=1
          SLACK_WEBHOOK_URL=${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_TEST_CHANNEL=${{ secrets.SLACK_TEST_CHANNEL }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          IBKR_MARKET_DATA_TYPE=${{ secrets.IBKR_MARKET_DATA_TYPE }}
          DISABLE_PORTFOLIO_MANAGER=${{ secrets.DISABLE_PORTFOLIO_MANAGER }}
          LOKI_URL=${{ secrets.LOKI_URL }}
          LOKI_USERNAME=${{ secrets.LOKI_USERNAME }}
          LOKI_PASSWORD=${{ secrets.LOKI_PASSWORD }}
          REDDIT_CLIENT_ID=${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET=${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USER_AGENT=${{ secrets.REDDIT_USER_AGENT }}
          ENVEOF
          chmod 600 .env

          # Pull latest gateway image and redeploy
          docker compose pull ib-gateway
          docker compose up -d --build app

          # Wait for services to be healthy
          sleep 10
          docker compose ps
          ENDSSH

      - name: Verify deployment
        run: |
          ssh -o StrictHostKeyChecking=no $TS_SSH_USER@$TS_HOST << 'ENDSSH'
          cd ~/optionscanner
          echo "=== Docker Compose Status ==="
          docker compose ps
          echo ""
          echo "=== Last 30 lines of app logs ==="
          docker logs --tail 30 algo-trader-app-1 2>&1 || echo "Container not found or not started"
          echo ""
          echo "=== Last 30 lines of ib-gateway logs ==="
          docker logs --tail 30 algo-trader-ib-gateway-1 2>&1 || echo "Container not found or not started"
          ENDSSH
